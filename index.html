<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>StockFlow</title>
    <script type="module" src="/src/renderer.ts"></script>
    <style>
      /* Um CSS rápido direto aqui ou no seu arquivo .css */
      body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
      header { background: #2c3e50; padding: 15px; color: white; display: flex; gap: 15px; }
      button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; background: #34495e; color: white; }
      button:hover { background: #4ca1af; }
      .page { display: none; padding: 20px; }
      .page.active { display: block; } /* Esta classe é a que mostra a página */
    </style>
  </head>
  <body>
    <header>
      <button id="btn-dashboard">Dashboard</button>
      <button id="btn-estoque">Controle de Estoque</button>
      <button id="btn-config">Configurações</button>
    </header>

    <main id="page-dashboard" class="page active">
      <h2>Visão Geral</h2>
      <p>Aqui ficarão os gráficos do seu estoque.</p>
    </main>

    <main id="page-estoque" class="page">
      <h2>Gerenciar Estoque</h2>
      <button>+ Novo Produto</button>
      <p>A tabela de produtos vai aparecer aqui.</p>
    </main>

    <main id="page-config" class="page">
      <h2>Configurações do Sistema</h2>
      <p>Configurações de rede, backup, etc.</p>
    </main>
  </body>
</html>
